name: Count R2 Files

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "Folder to count (leave empty to count all folders)"
        required: false
        type: string

jobs:
  count:
    runs-on: ubuntu-latest

    env:
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3

      - name: Count files
        run: |
          if [ -n "${{ github.event.inputs.folder }}" ]; then
            python count_r2_files.py --folder "${{ github.event.inputs.folder }}"
          else
            python count_r2_files.py
          fi